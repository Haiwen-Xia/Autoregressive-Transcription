---
sample_rate: 16000
clip_duration: 5.
max_question_len: 50
max_answering_len: 1000
fps: 100
output_root: "./maestro"
run_name: null

train_datasets:
    MAESTRO:
        root: "./datasets/maestro-v3.0.0"
        split: "train"

test_datasets:
    MAESTRO:
        root: "./datasets/maestro-v3.0.0"
        split: "test"


midi_to_tokens: MIDI2Tokens
        
audio_encoder:
    name: PianoTranscriptionCRnn # Conformer2d
    trainable: True
    
    # random_init: True  # True: from scratch (random init), False: load pretrained from piano_transcription_inference

tokenizer:
    name: BertMIDI

llm:
    name: Llama
    trainable: True
    block_size: 2048  # Maximize block size
    audio_latent_dim:  # Leave blank. Parsed later from audio_encoder
    vocab_size:  # Leave blank. Parsed later from len(tokenier)
    n_layer: 12
    n_head: 12
    n_embd: 768
    
train:
    device: "cuda:1"
    num_workers: 12
    remove_padded_columns: True
    loss: ce_loss
    optimizer: AdamW
    lr: 1e-4
    warm_up_steps: 1000  # Leave blank if no warm up is used
    batch_size_per_device: 4
    test_every_n_steps: 1000
    save_every_n_steps: 10000
    training_steps: 100000
    resume_ckpt_path: #/data/yrb/musicarena/Haiwen/Autoregressive-Transcription/checkpoints/train/piano_transcription_maestro/ckpt/step=60000.pth # /data/yrb/musicarena/Haiwen/Autoregressive-Transcription/maestro/20260307-145109_MERT/ckpt/step=100000.pth # Leave blank if train from scratch

no_log: false